<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>2026年度安全教育培训考核</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333}
.header{background:#1a3a5c;color:#fff;padding:18px 24px;text-align:center}
.header h1{font-size:1.3em}
.header p{font-size:.85em;margin-top:5px;opacity:.85}
.container{max-width:800px;margin:24px auto;padding:0 16px 60px}
.card{background:#fff;border-radius:8px;padding:22px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-grid label{display:block;font-size:.82em;color:#666;margin-bottom:4px}
.info-grid input{width:100%;border:1px solid #ddd;border-radius:4px;padding:8px 10px;font-size:.92em}
.notice{background:#fff7e6;border:1px solid #ffd591;border-radius:6px;padding:11px 15px;margin-bottom:18px;font-size:.85em;color:#874d00}
.sec-title{background:#1a3a5c;color:#fff;padding:7px 15px;border-radius:6px 6px 0 0;font-size:.88em;margin-top:18px}
.q-card{background:#fff;padding:16px 18px;border:1px solid #e8e8e8;border-top:none}
.q-text{font-size:.92em;line-height:1.6;margin-bottom:10px;font-weight:500}
.opts label{display:flex;align-items:flex-start;gap:8px;padding:5px 7px;border-radius:4px;cursor:pointer;font-size:.88em;line-height:1.5;transition:background .15s}
.opts label:hover{background:#f0f7ff}
.opts input{margin-top:3px;flex-shrink:0}
.submit-area{text-align:center;margin-top:26px}
.btn{background:#1a3a5c;color:#fff;border:none;padding:12px 44px;font-size:.95em;border-radius:6px;cursor:pointer}
.btn:hover{background:#0f2540}
.btn-sm{padding:7px 18px;font-size:.85em}
.ans-count{text-align:center;color:#666;font-size:.85em;margin-top:10px}
/* result overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.overlay.show{display:flex}
.result-box{background:#fff;border-radius:12px;padding:38px;text-align:center;max-width:380px;width:90%}
.circle{width:110px;height:110px;border-radius:50%;margin:0 auto 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:2em;font-weight:bold;color:#fff}
.pass{background:#52c41a}.fail{background:#ff4d4f}
/* admin */
#admin-section{display:none}
.admin-login{max-width:340px;margin:40px auto;background:#fff;border-radius:8px;padding:30px;box-shadow:0 2px 8px rgba(0,0,0,.1);text-align:center}

.admin-login input{width:100%;border:1px solid #ddd;border-radius:4px;padding:9px 12px;font-size:.95em;margin-bottom:12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat{background:#fff;border-radius:8px;padding:14px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.07)}
.stat .num{font-size:1.8em;font-weight:bold;color:#1a3a5c}
.stat .lbl{font-size:.78em;color:#888;margin-top:3px}
table{width:100%;background:#fff;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.07);border-collapse:collapse}
th{background:#1a3a5c;color:#fff;padding:9px 13px;text-align:left;font-size:.85em}
td{padding:9px 13px;border-bottom:1px solid #f0f0f0;font-size:.85em}
.ok{color:#52c41a;font-weight:bold}.no{color:#ff4d4f;font-weight:bold}
.admin-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.tab-bar{text-align:center;margin:18px 0 0}
.tab-btn{background:none;border:none;padding:8px 20px;font-size:.9em;cursor:pointer;color:#666;border-bottom:2px solid transparent}
.tab-btn.active{color:#1a3a5c;border-bottom-color:#1a3a5c;font-weight:bold}
</style>
</head>
<body>
<div class="header">
  <h1>中铁工业规划设计研究总院 · 绿碳中心</h1>
  <p>2026年度安全教育培训考核</p>
</div>

<div class="tab-bar">

  <button class="tab-btn" onclick="showTab('admin')">管理查看</button>

<!-- 答题区 -->

    </div>
  </div>

  <div id="quiz-form"></div>
  <div class="ans-count" id="ans-count">已作答：0 / 50 题</div>
  <div class="submit-area"><button class="btn" onclick="submitQuiz()">提交答卷</button></div>
</div>

<!-- 管理区 -->
<div id="admin-section" class="container">
  <div id="admin-login-wrap">
    <div class="admin-login">
      <h2>管理员登录</h2>
      <input type="password" id="admin-pwd" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')checkPwd()">
      <button class="btn" style="width:100%" onclick="checkPwd()">登录</button>
      <p id="pwd-err" style="color:#ff4d4f;font-size:.85em;margin-top:8px"></p>
    </div>
  </div>
  <div id="admin-content" style="display:none">
    <div class="stats">
      <div class="stat"><div class="num" id="s-total">-</div><div class="lbl">参考人数</div></div>
      <div class="stat"><div class="num" id="s-pass">-</div><div class="lbl">通过人数</div></div>
      <div class="stat"><div class="num" id="s-rate">-</div><div class="lbl">通过率</div></div>
      <div class="stat"><div class="num" id="s-avg">-</div><div class="lbl">平均分</div></div>
    </div>
    <div class="admin-bar">
      <span style="font-size:.88em;color:#666" id="last-refresh"></span>
      <div>
        <button class="btn btn-sm" onclick="loadAdmin()" style="margin-right:8px">刷新</button>
        <button class="btn btn-sm" onclick="exportCSV()">导出CSV</button>
      </div>
    </div>
    <table><thead><tr><th>#</th><th>姓名</th><th>部门</th><th>得分</th><th>结果</th><th>提交时间</th></tr></thead>
    <tbody id="tbody"><tr><td colspan="6" style="text-align:center;padding:24px;color:#999">加载中...</td></tr></tbody></table>
  </div>
</div>

<!-- 结果弹窗 -->
<div class="overlay" id="overlay">
  <div class="result-box">
    <div class="circle" id="r-circle"></div>
    <h2 id="r-title" style="margin-bottom:8px"></h2>
    <p id="r-detail" style="color:#666;font-size:.9em"></p>
    <p style="margin-top:14px;color:#aaa;font-size:.8em">结果已自动保存，可关闭页面</p>
  </div>
</div>

function showTab(t){
  document.getElementById('quiz-section').style.display=t==='quiz'?'':'none';
  document.getElementById('admin-section').style.display=t==='admin'?'':'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='quiz')||(i===1&&t==='admin')));
  if(t==='admin'&&document.getElementById('admin-content').style.display==='block')loadResults();
}

function buildQuiz(){
  let html='',last='';
  QS.forEach((item,i)=>{
    if(item.s&&item.s!==last){html+='<div class="sec-title">'+item.s+'</div>';last=item.s;}
    html+='<div class="q-card"><div class="q-text">'+item.q+'</div><div class="opts">';
    ['A','B','C','D'].forEach((l,j)=>{html+='<label><input type="radio" name="q'+(i+1)+'" value="'+l+'"> '+item.o[j]+'</label>';});
    html+='</div></div>';
  });
  document.getElementById('quiz-form').innerHTML=html;
  document.querySelectorAll('input[type=radio]').forEach(r=>r.addEventListener('change',()=>{
    let c=0;for(let i=1;i<=50;i++)if(document.querySelector('input[name="q'+i+'"]:checked'))c++;
    document.getElementById('ans-count').textContent='已作答：'+c+' / 50 题';
  }));
}

async function submitQuiz(){
  const name=document.getElementById('iname').value.trim();
  const dept=document.getElementById('idept').value.trim();
  if(!name||!dept){alert('请填写姓名和部门');return;}
  const answers={};let unanswered=[];
  for(let i=1;i<=50;i++){const s=document.querySelector('input[name="q'+i+'"]:checked');if(s)answers[i]=s.value;else unanswered.push(i);}
  if(unanswered.length>0&&!confirm('还有'+unanswered.length+'道题未作答，确定提交吗？'))return;
  let correct=0;
  for(let i=1;i<=50;i++)if(answers[i]===ANS[i])correct++;
  const score=correct*2;
  try{
    await fetch(SB+'/rest/v1/quiz_results',{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY},body:JSON.stringify({name,department:dept,score,answers})});
  }catch(e){console.error(e);}
  const circle=document.getElementById('circle');
  circle.className='circle '+(score>=80?'pass':'fail');
  circle.innerHTML='<span>'+score+'</span><span style="font-size:.38em;margin-top:3px">分</span>';
  document.getElementById('res-title').textContent=score>=80?'恭喜，考核通过！':'很遗憾，未通过考核';
  document.getElementById('res-detail').textContent=name+'，答对'+correct+'题，得'+score+'分（及格线80分）';
  document.getElementById('res-overlay').classList.add('show');
}

function checkPwd(){
  if(document.getElementById('admin-pwd').value===APWD){
    document.getElementById('admin-login-wrap').style.display='none';
    document.getElementById('admin-content').style.display='block';
    loadResults();
  }else{document.getElementById('pwd-err').textContent='密码错误';}
}

let allData=[];
async function loadResults(){
  try{
    const r=await fetch(SB+'/rest/v1/quiz_results?select=*&order=submit_time.desc',{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    allData=await r.json();
  }catch(e){document.getElementById('tbody').innerHTML='<tr><td colspan="6" style="text-align:center;color:#f00">加载失败：'+e.message+'</td></tr>';return;}
  if(!Array.isArray(allData)||!allData.length){document.getElementById('tbody').innerHTML='<tr><td colspan="6" style="text-align:center;padding:20px;color:#999">暂无数据</td></tr>';return;}
  const total=allData.length,passed=allData.filter(d=>d.score>=80).length;
  const avg=Math.round(allData.reduce((s,d)=>s+d.score,0)/total);
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-pass').textContent=passed;
  document.getElementById('s-rate').textContent=Math.round(passed/total*100)+'%';
  document.getElementById('s-avg').textContent=avg;
  document.getElementById('tbody').innerHTML=allData.map((d,i)=>'<tr><td>'+(i+1)+'</td><td>'+d.name+'</td><td>'+d.department+'</td><td><b>'+d.score+'</b></td><td class="'+(d.score>=80?'ok':'no')+'">'+(d.score>=80?'✓ 通过':'✗ 未通过')+'</td><td>'+new Date(d.submit_time).toLocaleString('zh-CN')+'</td></tr>').join('');
}

function exportCSV(){
  if(!allData.length){alert('暂无数据');return;}
  const rows=allData.map((d,i)=>(i+1)+','+d.name+','+d.department+','+d.score+','+(d.score>=80?'通过':'未通过')+','+new Date(d.submit_time).toLocaleString('zh-CN'));
  const blob=new Blob(['﻿序号,姓名,部门,得分,是否通过,提交时间\n'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='考核结果.csv';a.click();
}

buildQuiz();
</script>
