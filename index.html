{q:'48. 某实验室发生化学品轻微泄漏，以下处置顺序正确的是？',o:['A. 先拍照记录，再通知负责人，最后处置','B. 疏散人员→通风处理→穿戴防护用品处置或上报→记录并通知安全负责人','C. 立即用抹布擦拭，防止扩散','D. 打开所有窗户通风后正常继续实验']},
{q:'49. 李明发现办公室消防通道被纸箱堆满，正确的做法是？',o:['A. 这不是自己的职责，不予理会','B. 等清洁人员来时告诉他们','C. 立即要求清理，确保通道畅通，这属于机构负责人职责范围内的日常安全管控','D. 只要消防通道剩余宽度超过60cm就没关系']},
{q:'50. 张华在工地现场发现一个区域没有明显禁止标志，想进入拍照取证，以下说法正确的是？',o:['A. 没有禁止标志说明可以进入','B. 拍照时间短，快去快回没有危险','C. 须确认该区域已授权，严禁擅自进入非授权区域（如吊装半径内等）','D. 向现场工人打个招呼后可以进入']}
];

function buildQuiz(){
  const form=document.getElementById('quiz-form');
  let html='',lastS='';
  QS.forEach((item,i)=>{
    const n=i+1;
    if(item.s&&item.s!==lastS){html+=`<div class="section-title">${item.s}</div>`;lastS=item.s;}
    html+=`<div class="question-card"><div class="question-text">${item.q}</div><div class="options">`;
    ['A','B','C','D'].forEach((l,j)=>{html+=`<label><input type="radio" name="q${n}" value="${l}"> ${item.o[j]}</label>`;});
    html+=`</div></div>`;
  });
  form.innerHTML=html;
  document.querySelectorAll('input[type=radio]').forEach(r=>r.addEventListener('change',updateCount));
}

function updateCount(){
  let c=0;for(let i=1;i<=50;i++){if(document.querySelector(`input[name="q${i}"]:checked`))c++;}
  document.getElementById('answered-count').textContent=`已作答：${c} / 50 题`;
}

async function submitQuiz(){
  const name=document.getElementById('iname').value.trim();
  const dept=document.getElementById('idept').value.trim();
  if(!name||!dept){alert('请填写姓名和部门');return;}
  const answers={};let unanswered=[];
  for(let i=1;i<=50;i++){
    const s=document.querySelector(`input[name="q${i}"]:checked`);
    if(s)answers[i]=s.value;else unanswered.push(i);
  }
  if(unanswered.length>0&&!confirm(`还有 ${unanswered.length} 道题未作答，确定提交吗？`))return;
  let correct=0;
  for(let i=1;i<=50;i++){if(answers[i]===ANSWERS[i])correct++;}
  const score=correct*2;
  await fetch(`${SB_URL}/rest/v1/quiz_results`,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY},
    body:JSON.stringify({name,department:dept,score,answers})
  });
  const circle=document.getElementById('score-circle');
  circle.className='score-circle '+(score>=80?'pass':'fail');
  circle.innerHTML=`<span>${score}</span><span style="font-size:.4em;margin-top:4px">分</span>`;
  document.getElementById('result-title').textContent=score>=80?'恭喜，考核通过！':'很遗憾，未通过考核';
  document.getElementById('result-detail').textContent=`${name}，您答对 ${correct} 题，得 ${score} 分（及格线80分）`;
  document.getElementById('result-overlay').classList.add('show');
}

buildQuiz();
</script>
